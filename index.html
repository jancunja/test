<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Load Text File</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 40px 20px;
      color: #222;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .text-box {
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 17px;
      min-height: 120px;
      text-indent: 20px;
    }

    .loading {
      color: #777;
      font-style: italic;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Text</h1>
    <div id="text-content" class="text-box loading">Loading text...</div>
  </div>

  <script>
    fetch("001KZD.txt")
      .then(response => {
        if (!response.ok) {
          throw new Error("Failed to load file.");
        }
        return response.text();
      })
      .then(data => {
        const box = document.getElementById("text-content");
        box.textContent = data;
        box.classList.remove("loading");
      })
      .catch(error => {
        const box = document.getElementById("text-content");
        box.textContent = "Could not load the text file.";
        box.classList.remove("loading");
        box.classList.add("error");
        console.error(error);
      });
  </script>
</body>
</html>
