<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Load Text File</title>
  <title>Short Story</title>
<style>
body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
margin: 0;
padding: 40px 20px;
      background: #f5f3ee;
color: #222;
      font-family: Georgia, "Times New Roman", serif;
}

    .container {
      max-width: 800px;
    .page {
      max-width: 720px;
margin: 0 auto;
      background: white;
      padding: 48px 36px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      border-radius: 16px;
}

    .text-box {
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 17px;
      min-height: 120px;
    h1 {
      margin-top: 0;
      margin-bottom: 32px;
      font-size: 36px;
      font-weight: normal;
      text-align: center;
    }

    #text-content {
      font-size: 20px;
      line-height: 1.75;
    }

    #text-content p {
      margin: 0 0 1em 0;
text-indent: 20px;
}

    .loading {
      color: #777;
    .loading,
    .error {
      text-indent: 0 !important;
font-style: italic;
}

.error {
      color: #b00020;
      font-weight: bold;
      color: #a00000;
    }

    @media (max-width: 700px) {
      body {
        padding: 20px 12px;
      }

      .page {
        padding: 28px 20px;
      }

      h1 {
        font-size: 28px;
      }

      #text-content {
        font-size: 18px;
      }
}
</style>
</head>
<body>
  <div class="container">
    <h1>My Text</h1>
    <div id="text-content" class="text-box loading">Loading text...</div>
  </div>
  <main class="page">
    <h1>Short Story</h1>
    <div id="text-content">
      <p class="loading">Loading story...</p>
    </div>
  </main>

<script>
fetch("001KZD.txt")
.then(response => {
if (!response.ok) {
          throw new Error("Failed to load file.");
          throw new Error("Could not load the text file.");
}
return response.text();
})
.then(data => {
        const box = document.getElementById("text-content");
        box.textContent = data;
        box.classList.remove("loading");
        const paragraphs = data
          .split(/\r?\n\r?\n/)
          .map(p => p.trim())
          .filter(p => p.length > 0);

        const html = paragraphs
          .map(p => `<p>${escapeHtml(p)}</p>`)
          .join("");

        document.getElementById("text-content").innerHTML = html;
})
.catch(error => {
        const box = document.getElementById("text-content");
        box.textContent = "Could not load the text file.";
        box.classList.remove("loading");
        box.classList.add("error");
        document.getElementById("text-content").innerHTML =
          `<p class="error">Could not load the story.</p>`;
console.error(error);
});

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }
</script>
</body>
</html>
